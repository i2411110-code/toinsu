<!-- 
  실손 예상 보험금 계산기 (토스풍)
  components/ 폴더 안에 page-silbi.html 로 저장하세요.
  app.js의 window.calculateSilson / silson 관련 함수는 기존 그대로 사용합니다.
-->

<section class="silson-wrap toss">
  <div class="silson-box">

    <!-- 헤더 -->
    <div class="toss-hero" style="padding:24px 24px 26px; margin-bottom:16px;">
      <button class="toss-home-btn" onclick="window.goBack()">
        <i class="bi bi-house-fill"></i> 메인화면
      </button>
      <div class="toss-hero-tag"><i class="bi bi-calculator-fill"></i> 실비계산기</div>
      <p class="toss-hero-sub">세대별 실손 예상 보험금을 한눈에</p>
      <h1 class="toss-hero-title" style="font-size:22px;">실손 예상 보험금<br>계산기</h1>
    </div>

    <!-- 세대 선택 -->
    <div class="toss-card">
      <div class="toss-card-title" style="margin-bottom:16px;">세대 선택</div>
      <div class="silson-gen-grid" id="silson-gen-grid">
        <!-- JS로 렌더링 -->
      </div>
    </div>

    <!-- 통원/입원 탭 -->
    <div class="toss-card">
      <div class="toss-card-title" style="margin-bottom:16px;">진료 유형</div>
      <div class="silson-type-toggle">
        <button class="silson-type-btn active" id="btn-outpatient" onclick="window.switchSilsonType('outpatient')">통원</button>
        <button class="silson-type-btn" id="btn-inpatient" onclick="window.switchSilsonType('inpatient')">입원</button>
      </div>
    </div>

    <!-- 통원 입력 영역 -->
    <div id="silson-outpatient-area">

      <!-- 통원 외래 -->
      <div class="toss-card">
        <div class="toss-card-title" style="margin-bottom:16px;">통원 (외래)</div>

        <!-- 통원 한도 선택 -->
        <div class="silson-group" id="silson-limit-group">
          <label>통원비 한도</label>
          <select id="silson-limit-select" class="silson-select" onchange="window.silsonState.limitIdx=Number(this.value); window.renderSilsonResult()">
          </select>
        </div>

        <!-- 병원 등급 -->
        <div class="silson-group">
          <label>병원 등급 <span id="silson-nongubun-hint" class="silson-hint" style="display:none;">비급여: 병원등급 무관 (30% 또는 최소 30,000원)</span></label>
          <div class="silson-grade-btns">
            <button class="silson-grade-btn active" data-grade="clinic" onclick="window.selectSilsonGrade('clinic')">병·의원</button>
            <button class="silson-grade-btn" data-grade="hospital" onclick="window.selectSilsonGrade('hospital')">종합병원</button>
            <button class="silson-grade-btn" data-grade="general" onclick="window.selectSilsonGrade('general')">상급종합병원</button>
          </div>
        </div>

        <!-- 급여 / 비급여 입력 -->
        <div class="silson-row">
          <div class="silson-group">
            <label>급여</label>
            <input type="number" id="silson-gubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>비급여</label>
            <input type="number" id="silson-nongubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
        </div>

        <!-- 외래 결과 -->
        <div class="silson-result-mini" id="silson-outpatient-result"></div>
      </div>

      <!-- 약제비 (1세대, 4세대, 유병자 제외) -->
      <div class="toss-card" id="silson-prescription-card" style="display:none;">
        <div class="toss-card-title" style="margin-bottom:16px;">통원 (약제)</div>
        <div class="silson-row">
          <div class="silson-group">
            <label>급여</label>
            <input type="number" id="silson-presc-gubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>비급여</label>
            <input type="number" id="silson-presc-nongubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
        </div>
        <div class="silson-result-mini" id="silson-prescription-result"></div>
      </div>

      <!-- 비급여 3종 (3세대, 4세대) -->
      <div class="toss-card" id="silson-type3-card" style="display:none;">
        <div class="toss-card-title" style="margin-bottom:16px;">비급여 3종</div>
        <div class="silson-row">
          <div class="silson-group">
            <label>비급여 주사제</label>
            <input type="number" id="silson-injection" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>공제액</label>
            <input type="text" id="silson-injection-deduct" class="silson-input silson-readonly" readonly>
          </div>
        </div>
        <div class="silson-row">
          <div class="silson-group">
            <label>도수치료 / 체외충격파</label>
            <input type="number" id="silson-manual" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>공제액</label>
            <input type="text" id="silson-manual-deduct" class="silson-input silson-readonly" readonly>
          </div>
        </div>
        <div class="silson-row">
          <div class="silson-group">
            <label>MRI / MRA</label>
            <input type="number" id="silson-mri" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>공제액</label>
            <input type="text" id="silson-mri-deduct" class="silson-input silson-readonly" readonly>
          </div>
        </div>
        <div class="silson-result-mini" id="silson-type3-result"></div>
      </div>

    </div><!-- /outpatient-area -->

    <!-- 입원 입력 영역 -->
    <div id="silson-inpatient-area" style="display:none;">
      <div class="toss-card">
        <div class="toss-card-title" style="margin-bottom:16px;">입원</div>
        <div class="silson-row">
          <div class="silson-group">
            <label>급여</label>
            <input type="number" id="silson-inp-gubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>비급여</label>
            <input type="number" id="silson-inp-nongubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
        </div>
        <div class="silson-row">
          <div class="silson-group">
            <label>입원일수</label>
            <input type="number" id="silson-days" class="silson-input" placeholder="1" value="1" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>병실</label>
            <select id="silson-room" class="silson-select" onchange="window.renderSilsonResult()">
              <option value="standard">기준병실</option>
              <option value="premium">상급병실</option>
            </select>
          </div>
        </div>
        <div id="silson-room-extra" style="display:none;">
          <div class="silson-group">
            <label>상급병실료 차액</label>
            <input type="number" id="silson-room-diff" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
        </div>
        <div class="silson-result-mini" id="silson-inpatient-result"></div>
      </div>

      <!-- 입원 비급여 3종 -->
      <div class="toss-card" id="silson-inp-type3-card" style="display:none;">
        <div class="toss-card-title" style="margin-bottom:16px;">비급여 3종 (입원)</div>
        <div class="silson-row">
          <div class="silson-group"><label>비급여 주사제</label><input type="number" id="silson-inp-injection" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()"></div>
          <div class="silson-group"><label>공제액</label><input type="text" id="silson-inp-injection-deduct" class="silson-input silson-readonly" readonly></div>
        </div>
        <div class="silson-row">
          <div class="silson-group"><label>도수치료 / 체외충격파</label><input type="number" id="silson-inp-manual" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()"></div>
          <div class="silson-group"><label>공제액</label><input type="text" id="silson-inp-manual-deduct" class="silson-input silson-readonly" readonly></div>
        </div>
        <div class="silson-row">
          <div class="silson-group"><label>MRI / MRA</label><input type="number" id="silson-inp-mri" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()"></div>
          <div class="silson-group"><label>공제액</label><input type="text" id="silson-inp-mri-deduct" class="silson-input silson-readonly" readonly></div>
        </div>
        <div class="silson-result-mini" id="silson-inp-type3-result"></div>
      </div>
    </div><!-- /inpatient-area -->

    <!-- 최종 결과 -->
    <div class="silson-total" id="silson-total-card">
      <div class="silson-total-label" id="silson-total-label">통원 예상 보험금</div>
      <div class="silson-total-amount" id="silson-total-amount">0원</div>
      <p class="silson-total-notice">보상 제외 질환 및 실손 약관에 따라 실제 보험금은 상이할 수 있습니다.</p>
    </div>

  </div>
</section>

<style>
/* ============ TOSS STYLE OVERRIDES (실비계산기) ============ */
.silson-wrap.toss { padding: 0 0 30px; }
.silson-wrap.toss .silson-box { max-width: 680px; margin: 0 auto; display:flex; flex-direction:column; gap:16px; }

.silson-wrap.toss .toss-card { padding: 22px 20px; }

/* 세대 선택 버튼 */
.silson-wrap.toss .silson-gen-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:8px; }
@media (min-width:500px) { .silson-wrap.toss .silson-gen-grid { grid-template-columns: repeat(4, 1fr); } }
.silson-wrap.toss .silson-gen-btn {
    background:#F9FAFB; border:1.5px solid #F2F4F6; border-radius:14px;
    padding:12px 8px; text-align:left; cursor:pointer; transition:all 0.15s;
    display:flex; flex-direction:column; gap:3px;
}
.silson-wrap.toss .silson-gen-btn:hover { border-color:#3182F6; }
.silson-wrap.toss .silson-gen-btn.active { background:#EFF6FF; border-color:#3182F6; }
.silson-wrap.toss .silson-gen-btn .gen-label { font-size:13px; font-weight:800; color:#191F28; }
.silson-wrap.toss .silson-gen-btn.active .gen-label { color:#3182F6; }
.silson-wrap.toss .silson-gen-btn .gen-period { font-size:10px; color:#8B95A1; font-weight:600; }

/* 통원/입원 토글 */
.silson-wrap.toss .silson-type-toggle {
    display:grid; grid-template-columns:1fr 1fr; background:#F2F4F6;
    border-radius:14px; padding:4px; gap:4px;
}
.silson-wrap.toss .silson-type-btn {
    border:none; border-radius:11px; padding:13px; font-size:14px; font-weight:800;
    cursor:pointer; background:transparent; color:#8B95A1; transition:all 0.15s;
    font-family:'Noto Sans KR', sans-serif;
}
.silson-wrap.toss .silson-type-btn.active { background:white; color:#3182F6; box-shadow:0 1px 4px rgba(0,0,0,0.06); }

/* 입력 그룹 */
.silson-wrap.toss .silson-group { margin-bottom:14px; display:flex; flex-direction:column; gap:6px; }
.silson-wrap.toss .silson-group:last-child { margin-bottom:0; }
.silson-wrap.toss .silson-group label { font-size:12px; font-weight:800; color:#8B95A1; }
.silson-wrap.toss .silson-hint { font-size:11px; font-weight:700; color:#3182F6; margin-left:6px; }
.silson-wrap.toss .silson-select,
.silson-wrap.toss .silson-input {
    width:100%; padding:13px 14px; border:1.5px solid #F2F4F6; border-radius:12px;
    font-size:15px; font-family:'Noto Sans KR', sans-serif; outline:none;
    background:#F9FAFB; color:#191F28; transition:border-color 0.15s, background 0.15s;
}
.silson-wrap.toss .silson-select:focus,
.silson-wrap.toss .silson-input:focus { border-color:#3182F6; background:white; }
.silson-wrap.toss .silson-readonly { background:#F2F4F6; color:#8B95A1; cursor:default; }

.silson-wrap.toss .silson-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* 병원 등급 버튼 */
.silson-wrap.toss .silson-grade-btns { display:flex; gap:8px; flex-wrap:wrap; }
.silson-wrap.toss .silson-grade-btn {
    flex:1; min-width:70px; padding:11px 6px; border:1.5px solid #F2F4F6; border-radius:12px;
    background:#F9FAFB; font-size:13px; font-weight:800; color:#8B95A1; cursor:pointer;
    transition:all 0.15s; font-family:'Noto Sans KR', sans-serif;
}
.silson-wrap.toss .silson-grade-btn.active { background:#EFF6FF; border-color:#3182F6; color:#3182F6; }

/* 결과 미니 테이블 */
.silson-wrap.toss .silson-result-mini {
    margin-top:14px; background:#F9FAFB; border-radius:14px; border:1px solid #F2F4F6; overflow:hidden;
}
.silson-wrap.toss .silson-result-mini table { width:100%; border-collapse:collapse; font-size:13px; }
.silson-wrap.toss .silson-result-mini td { padding:11px 14px; border-bottom:1px solid #F2F4F6; color:#4E5968; }
.silson-wrap.toss .silson-result-mini td:last-child { text-align:right; font-weight:800; color:#191F28; }
.silson-wrap.toss .silson-result-mini tr:last-child td { border-bottom:none; background:#EFF6FF; color:#3182F6; font-weight:900; font-size:14px; }
.silson-wrap.toss .silson-result-mini tr:last-child td:first-child { color:#3182F6; }

/* 최종 결과 카드 */
.silson-wrap.toss .silson-total {
    background:#3182F6; border-radius:20px; padding:28px 24px; color:white; text-align:center;
}
.silson-wrap.toss .silson-total-label { font-size:13px; opacity:0.85; margin-bottom:8px; font-weight:700; }
.silson-wrap.toss .silson-total-amount { font-size:34px; font-weight:900; letter-spacing:-1px; margin-bottom:12px; }
.silson-wrap.toss .silson-total-notice { font-size:11px; opacity:0.75; line-height:1.5; }
</style>
