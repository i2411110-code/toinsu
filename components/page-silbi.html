<!-- 
  실손 예상 보험금 계산기
  components/ 폴더 안에 page-silson.html 로 저장하세요.
  그리고 app.js 하단에 window.calculateSilson 함수를 추가하세요.
-->

<section class="silson-wrap">
  <div class="silson-box">

    <!-- 헤더 -->
    <div class="silson-header">
      <button class="inline-home-btn" onclick="window.goBack()">
        <i class="bi bi-house-fill"></i> 메인화면
      </button>
      <div class="silson-title-wrap">
        <i class="bi bi-calculator-fill" style="color:var(--main-blue); font-size:22px;"></i>
        <h2 class="silson-title">실손 예상 보험금 계산기</h2>
      </div>
    </div>

    <!-- 세대 선택 -->
    <div class="silson-card">
      <div class="silson-card-title">세대 선택</div>
      <div class="silson-gen-grid" id="silson-gen-grid">
        <!-- JS로 렌더링 -->
      </div>
    </div>

    <!-- 통원/입원 탭 -->
    <div class="silson-card">
      <div class="silson-card-title">진료 유형</div>
      <div class="silson-type-toggle">
        <button class="silson-type-btn active" id="btn-outpatient" onclick="window.switchSilsonType('outpatient')">통원</button>
        <button class="silson-type-btn" id="btn-inpatient" onclick="window.switchSilsonType('inpatient')">입원</button>
      </div>
    </div>

    <!-- 통원 입력 영역 -->
    <div id="silson-outpatient-area">

      <!-- 통원 외래 -->
      <div class="silson-card">
        <div class="silson-card-title">통원 (외래)</div>

        <!-- 통원 한도 선택 -->
        <div class="silson-group" id="silson-limit-group">
          <label>통원비 한도</label>
          <select id="silson-limit-select" class="silson-select" onchange="window.silsonState.limitIdx=Number(this.value); window.renderSilsonResult()">
          </select>
        </div>

        <!-- 병원 등급 -->
        <div class="silson-group">
          <label>병원 등급 <span id="silson-nongubun-hint" class="silson-hint" style="display:none;">비급여: 병원등급 무관 (30% 또는 최소 30,000원)</span></label>
          <div class="silson-grade-btns">
            <button class="silson-grade-btn active" data-grade="clinic" onclick="window.selectSilsonGrade('clinic')">병·의원</button>
            <button class="silson-grade-btn" data-grade="hospital" onclick="window.selectSilsonGrade('hospital')">종합병원</button>
            <button class="silson-grade-btn" data-grade="general" onclick="window.selectSilsonGrade('general')">상급종합병원</button>
          </div>
        </div>

        <!-- 급여 / 비급여 입력 -->
        <div class="silson-row">
          <div class="silson-group">
            <label>급여</label>
            <input type="number" id="silson-gubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>비급여</label>
            <input type="number" id="silson-nongubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
        </div>

        <!-- 외래 결과 -->
        <div class="silson-result-mini" id="silson-outpatient-result"></div>
      </div>

      <!-- 약제비 (1세대, 4세대, 유병자 제외) -->
      <div class="silson-card" id="silson-prescription-card" style="display:none;">
        <div class="silson-card-title">통원 (약제)</div>
        <div class="silson-row">
          <div class="silson-group">
            <label>급여</label>
            <input type="number" id="silson-presc-gubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>비급여</label>
            <input type="number" id="silson-presc-nongubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
        </div>
        <div class="silson-result-mini" id="silson-prescription-result"></div>
      </div>

      <!-- 비급여 3종 (3세대, 4세대) -->
      <div class="silson-card" id="silson-type3-card" style="display:none;">
        <div class="silson-card-title">비급여 3종</div>
        <div class="silson-row">
          <div class="silson-group">
            <label>비급여 주사제</label>
            <input type="number" id="silson-injection" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>공제액</label>
            <input type="text" id="silson-injection-deduct" class="silson-input silson-readonly" readonly>
          </div>
        </div>
        <div class="silson-row">
          <div class="silson-group">
            <label>도수치료 / 체외충격파</label>
            <input type="number" id="silson-manual" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>공제액</label>
            <input type="text" id="silson-manual-deduct" class="silson-input silson-readonly" readonly>
          </div>
        </div>
        <div class="silson-row">
          <div class="silson-group">
            <label>MRI / MRA</label>
            <input type="number" id="silson-mri" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>공제액</label>
            <input type="text" id="silson-mri-deduct" class="silson-input silson-readonly" readonly>
          </div>
        </div>
        <div class="silson-result-mini" id="silson-type3-result"></div>
      </div>

    </div><!-- /outpatient-area -->

    <!-- 입원 입력 영역 -->
    <div id="silson-inpatient-area" style="display:none;">
      <div class="silson-card">
        <div class="silson-card-title">입원</div>
        <div class="silson-row">
          <div class="silson-group">
            <label>급여</label>
            <input type="number" id="silson-inp-gubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>비급여</label>
            <input type="number" id="silson-inp-nongubun" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
        </div>
        <div class="silson-row">
          <div class="silson-group">
            <label>입원일수</label>
            <input type="number" id="silson-days" class="silson-input" placeholder="1" value="1" oninput="window.renderSilsonResult()">
          </div>
          <div class="silson-group">
            <label>병실</label>
            <select id="silson-room" class="silson-select" onchange="window.renderSilsonResult()">
              <option value="standard">기준병실</option>
              <option value="premium">상급병실</option>
            </select>
          </div>
        </div>
        <div id="silson-room-extra" style="display:none;">
          <div class="silson-group">
            <label>상급병실료 차액</label>
            <input type="number" id="silson-room-diff" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()">
          </div>
        </div>
        <div class="silson-result-mini" id="silson-inpatient-result"></div>
      </div>

      <!-- 입원 비급여 3종 -->
      <div class="silson-card" id="silson-inp-type3-card" style="display:none;">
        <div class="silson-card-title">비급여 3종 (입원)</div>
        <div class="silson-row">
          <div class="silson-group"><label>비급여 주사제</label><input type="number" id="silson-inp-injection" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()"></div>
          <div class="silson-group"><label>공제액</label><input type="text" id="silson-inp-injection-deduct" class="silson-input silson-readonly" readonly></div>
        </div>
        <div class="silson-row">
          <div class="silson-group"><label>도수치료 / 체외충격파</label><input type="number" id="silson-inp-manual" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()"></div>
          <div class="silson-group"><label>공제액</label><input type="text" id="silson-inp-manual-deduct" class="silson-input silson-readonly" readonly></div>
        </div>
        <div class="silson-row">
          <div class="silson-group"><label>MRI / MRA</label><input type="number" id="silson-inp-mri" class="silson-input" placeholder="0" oninput="window.renderSilsonResult()"></div>
          <div class="silson-group"><label>공제액</label><input type="text" id="silson-inp-mri-deduct" class="silson-input silson-readonly" readonly></div>
        </div>
        <div class="silson-result-mini" id="silson-inp-type3-result"></div>
      </div>
    </div><!-- /inpatient-area -->

    <!-- 최종 결과 -->
    <div class="silson-total" id="silson-total-card">
      <div class="silson-total-label" id="silson-total-label">통원 예상 보험금</div>
      <div class="silson-total-amount" id="silson-total-amount">0원</div>
      <p class="silson-total-notice">보상 제외 질환 및 실손 약관에 따라 실제 보험금은 상이할 수 있습니다.</p>
    </div>

  </div>
</section>

<style>
.silson-wrap { padding: 10px 0 30px; }
.silson-box { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

.silson-header { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
.silson-title-wrap { display: flex; align-items: center; gap: 8px; }
.silson-title { font-size: 20px; font-weight: 700; color: var(--text-dark); margin: 0; }

.silson-card { background: white; border-radius: 20px; padding: 22px 24px; box-shadow: var(--card-shadow); border: 1px solid rgba(255,255,255,0.8); }
.silson-card-title { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #F0F2FA; }

.silson-gen-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
@media (min-width: 500px) { .silson-gen-grid { grid-template-columns: repeat(4, 1fr); } }
.silson-gen-btn { background: #F8FAFC; border: 1.5px solid #E2E8F0; border-radius: 12px; padding: 10px 8px; text-align: left; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 3px; }
.silson-gen-btn:hover { border-color: var(--main-blue); }
.silson-gen-btn.active { background: #EFF6FF; border-color: var(--main-blue); }
.silson-gen-btn .gen-label { font-size: 13px; font-weight: 700; color: var(--text-dark); }
.silson-gen-btn.active .gen-label { color: var(--main-blue); }
.silson-gen-btn .gen-period { font-size: 10px; color: var(--text-muted); }

.silson-type-toggle { display: grid; grid-template-columns: 1fr 1fr; background: #E2E8F0; border-radius: 12px; padding: 4px; gap: 4px; }
.silson-type-btn { border: none; border-radius: 9px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; }
.silson-type-btn.active { background: white; color: var(--main-blue); box-shadow: 0 2px 6px rgba(0,0,0,0.08); }

.silson-group { margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
.silson-group label { font-size: 12px; font-weight: 700; color: var(--text-muted); }
.silson-hint { font-size: 11px; font-weight: 500; color: #2563EB; margin-left: 6px; }
.silson-select, .silson-input { width: 100%; padding: 11px 14px; border: 1.5px solid #E2E8F0; border-radius: 10px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; outline: none; background: white; transition: border-color 0.2s; }
.silson-select:focus, .silson-input:focus { border-color: var(--main-blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
.silson-readonly { background: #F8FAFC; color: var(--text-muted); cursor: default; }

.silson-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.silson-grade-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.silson-grade-btn { flex: 1; min-width: 70px; padding: 10px 6px; border: 1.5px solid #E2E8F0; border-radius: 10px; background: white; font-size: 13px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; }
.silson-grade-btn.active { background: #EFF6FF; border-color: var(--main-blue); color: var(--main-blue); }

.silson-result-mini { margin-top: 14px; background: #F8FAFC; border-radius: 12px; border: 1px solid #E8EDF5; overflow: hidden; }
.silson-result-mini table { width: 100%; border-collapse: collapse; font-size: 13px; }
.silson-result-mini td { padding: 9px 14px; border-bottom: 1px solid #EEF1F8; }
.silson-result-mini td:last-child { text-align: right; font-weight: 700; }
.silson-result-mini tr:last-child td { border-bottom: none; background: #EFF6FF; color: var(--main-blue); font-weight: 900; font-size: 14px; }
.silson-result-mini tr:last-child td:first-child { color: var(--main-blue); }

.silson-total { background: linear-gradient(135deg, #1D4ED8 0%, #2563EB 100%); border-radius: 20px; padding: 28px 24px; color: white; text-align: center; box-shadow: 0 12px 30px -8px rgba(37,99,235,0.35); }
.silson-total-label { font-size: 13px; opacity: 0.85; margin-bottom: 8px; }
.silson-total-amount { font-size: 34px; font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; }
.silson-total-notice { font-size: 11px; opacity: 0.7; line-height: 1.5; }
</style>

<script>
(function() {
  // =====================================================
  // 세대 데이터 (원본 로직 그대로)
  // =====================================================
  const GENERATIONS = [
    {
      id: "1gen", label: "1세대", period: "~2009.09",
      coverGubun: 100, coverNonGubun: 100, inpatientLimit: 5e7, has3Types: false,
      limitOptions: [
        { label: "10만원", outpatientLimit: 1e5, prescriptionLimit: 0 },
        { label: "30만원", outpatientLimit: 3e5, prescriptionLimit: 0 },
        { label: "50만원", outpatientLimit: 5e5, prescriptionLimit: 0 }
      ],
      deductible: { clinic: 5000, hospital: 10000, general: 10000, prescription: 0 }
    },
    {
      id: "2gen", label: "2세대", period: "2009.10~2013.03",
      coverGubun: 90, coverNonGubun: 90, inpatientLimit: 5e7, has3Types: false,
      limitOptions: [
        { label: "외래 20만원 / 약제 10만원", outpatientLimit: 2e5, prescriptionLimit: 1e5 },
        { label: "외래 25만원 / 약제 5만원", outpatientLimit: 25e4, prescriptionLimit: 5e4 }
      ],
      deductible: { clinic: 10000, hospital: 15000, general: 20000, prescription: 8000 }
    },
    {
      id: "2gen2", label: "2세대", period: "2013.04~2017.03",
      coverGubun: 90, coverNonGubun: 80, inpatientLimit: 5e7, has3Types: false,
      limitOptions: [
        { label: "외래 20만원 / 약제 10만원", outpatientLimit: 2e5, prescriptionLimit: 1e5 },
        { label: "외래 25만원 / 약제 5만원", outpatientLimit: 25e4, prescriptionLimit: 5e4 }
      ],
      deductible: { clinic: 10000, hospital: 15000, general: 20000, prescription: 8000 }
    },
    {
      id: "3gen", label: "3세대", period: "2017.04~2021.06",
      coverGubun: 90, coverNonGubun: 80, inpatientLimit: 5e7, has3Types: true, type3SelfRate: 30,
      limitOptions: [
        { label: "외래 20만원 / 약제 10만원", outpatientLimit: 2e5, prescriptionLimit: 1e5 },
        { label: "외래 25만원 / 약제 5만원", outpatientLimit: 25e4, prescriptionLimit: 5e4 }
      ],
      deductible: { clinic: 10000, hospital: 15000, general: 20000, prescription: 8000 },
      type3Deductible: { injection: 20000, manual: 20000, mri: 20000 }
    },
    {
      id: "4gen", label: "4세대", period: "2021.07~2026.04",
      coverGubun: 80, coverNonGubun: 70, inpatientLimit: 5e7, has3Types: true, type3SelfRate: 30, is4gen: true,
      limitOptions: [
        { label: "20만원(외래+약제)", outpatientLimit: 2e5, prescriptionLimit: 0 }
      ],
      deductible: { clinic: 10000, hospital: 15000, general: 20000 },
      type3Deductible: { injection: 30000, manual: 30000, mri: 30000 }
    },
    {
      id: "5gen", label: "5세대", period: "2026.05~",
      is5gen: true, inpatientLimit: 5e7
    },
    {
      id: "sick", label: "유병자실손", period: "",
      coverGubun: 70, coverNonGubun: 70, inpatientLimit: 5e7, has3Types: false,
      limitOptions: [{ label: "20만원", outpatientLimit: 2e5, prescriptionLimit: 0 }],
      deductible: { clinic: 20000, hospital: 20000, general: 20000, prescription: 0 }
    }
  ];

  // 상태
  window.silsonState = {
    genId: '4gen',
    type: 'outpatient',
    grade: 'clinic',
    limitIdx: 0
  };

  const n = (v) => Number(v) || 0;
  const fmt = (v) => Math.round(Math.max(0, v)).toLocaleString();
  const floor100 = (v) => Math.floor(Math.max(0, v) / 100) * 100;

  // =====================================================
  // 세대 버튼 렌더링
  // =====================================================
  function renderGenGrid() {
    const grid = document.getElementById('silson-gen-grid');
    if (!grid) return;
    grid.innerHTML = GENERATIONS.map(g => `
      <button class="silson-gen-btn ${window.silsonState.genId === g.id ? 'active' : ''}"
        onclick="window.selectSilsonGen('${g.id}')">
        <span class="gen-label">${g.label}</span>
        ${g.period ? `<span class="gen-period">${g.period}</span>` : ''}
      </button>
    `).join('');
  }

  // =====================================================
  // 세대 선택
  // =====================================================
  window.selectSilsonGen = function(id) {
    window.silsonState.genId = id;
    window.silsonState.limitIdx = 0;
    renderGenGrid();
    updateSilsonUI();
    window.renderSilsonResult();
  };

  // =====================================================
  // 병원 등급 선택
  // =====================================================
  window.selectSilsonGrade = function(grade) {
    window.silsonState.grade = grade;
    document.querySelectorAll('.silson-grade-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.grade === grade);
    });
    window.renderSilsonResult();
  };

  // =====================================================
  // 통원/입원 전환
  // =====================================================
  window.switchSilsonType = function(type) {
    window.silsonState.type = type;
    document.getElementById('btn-outpatient').classList.toggle('active', type === 'outpatient');
    document.getElementById('btn-inpatient').classList.toggle('active', type === 'inpatient');
    document.getElementById('silson-outpatient-area').style.display = type === 'outpatient' ? '' : 'none';
    document.getElementById('silson-inpatient-area').style.display = type === 'inpatient' ? '' : 'none';
    document.getElementById('silson-total-label').textContent = type === 'outpatient' ? '통원 예상 보험금' : '입원 예상 보험금';
    window.renderSilsonResult();
  };

  // =====================================================
  // UI 업데이트 (세대 바뀔 때)
  // =====================================================
  function updateSilsonUI() {
    const g = GENERATIONS.find(x => x.id === window.silsonState.genId);
    if (!g) return;

    // 한도 select
    const limitSel = document.getElementById('silson-limit-select');
    const limitGroup = document.getElementById('silson-limit-group');
    if (g.limitOptions) {
      limitGroup.style.display = '';
      limitSel.innerHTML = g.limitOptions.map((opt, i) =>
        `<option value="${i}">${opt.label}</option>`
      ).join('');
      limitSel.value = window.silsonState.limitIdx;
    } else {
      limitGroup.style.display = 'none';
    }

    // 4세대 비급여 힌트
    document.getElementById('silson-nongubun-hint').style.display = g.is4gen ? '' : 'none';

    // 약제비 카드 (4세대·1세대·유병자 숨김)
    const showPresc = !g.is4gen && !g.is5gen && g.id !== 'sick' && g.limitOptions && g.limitOptions[0]?.prescriptionLimit > 0;
    document.getElementById('silson-prescription-card').style.display = showPresc ? '' : 'none';

    // 비급여3종 카드
    const show3 = g.has3Types && !g.is5gen;
    document.getElementById('silson-type3-card').style.display = show3 ? '' : 'none';
    document.getElementById('silson-inp-type3-card').style.display = show3 ? '' : 'none';

    // 상급병실 차액 입력
    document.getElementById('silson-room').addEventListener('change', function() {
      document.getElementById('silson-room-extra').style.display = this.value === 'premium' ? '' : 'none';
    });
  }

  // =====================================================
  // 외래 계산 (원본 nt() 함수)
  // =====================================================
  function calcOutpatient(g, grade, limitIdx) {
    if (g.is5gen) return { total: 0, deduct: 0, result: 0 };

    const limitOpt = g.limitOptions ? (g.limitOptions[limitIdx] || g.limitOptions[0]) : null;
    const outLimit = limitOpt ? limitOpt.outpatientLimit : 0;

    const covered = n(document.getElementById('silson-gubun')?.value);
    const nonCovered = n(document.getElementById('silson-nongubun')?.value);
    const total = covered + nonCovered;
    const deductAmt = g.deductible[grade] || 0;

    if (g.is4gen) {
      // 4세대: 급여/비급여 각각 공제 후 합산, 한도는 절반씩
      const coveredDeduct = covered > 0 ? Math.max(deductAmt, covered * (1 - g.coverGubun / 100)) : 0;
      const nonCoveredDeduct = nonCovered > 0 ? Math.max(30000, nonCovered * (1 - g.coverNonGubun / 100)) : 0;
      const coveredPay = Math.max(0, Math.min(covered - coveredDeduct, outLimit / 2));
      const nonCoveredPay = Math.max(0, Math.min(nonCovered - nonCoveredDeduct, outLimit / 2));
      const totalDeduct = coveredDeduct + nonCoveredDeduct;
      return { total, deduct: totalDeduct, result: coveredPay + nonCoveredPay };
    }

    // 1~3세대, 유병자
    const selfPay = covered * (1 - g.coverGubun / 100) + nonCovered * (1 - g.coverNonGubun / 100);
    const finalDeduct = Math.max(deductAmt, selfPay);
    const result = Math.max(0, Math.min(total - finalDeduct, outLimit));
    return { total, deduct: finalDeduct, result };
  }

  // =====================================================
  // 약제비 계산 (원본 ft() 함수)
  // =====================================================
  function calcPrescription(g, limitIdx) {
    if (g.is5gen || g.is4gen || g.id === 'sick') return null;
    const limitOpt = g.limitOptions ? (g.limitOptions[limitIdx] || g.limitOptions[0]) : null;
    const prescLimit = limitOpt ? limitOpt.prescriptionLimit : 0;
    if (!prescLimit) return null;

    const covered = n(document.getElementById('silson-presc-gubun')?.value);
    const nonCovered = n(document.getElementById('silson-presc-nongubun')?.value);
    const total = covered + nonCovered;
    const deductAmt = g.deductible.prescription || 0;
    const result = Math.max(0, Math.min(total - deductAmt, prescLimit));
    return { total, deduct: deductAmt, result };
  }

  // =====================================================
  // 비급여 3종 계산 (원본 tr() 함수)
  // =====================================================
  function calcType3(g, isInpatient) {
    if (!g.has3Types || g.is5gen) return null;
    const selfRate = g.type3SelfRate / 100;
    const d = g.type3Deductible;

    const prefix = isInpatient ? 'silson-inp-' : 'silson-';
    const injection = n(document.getElementById(`${prefix}injection`)?.value);
    const manual    = n(document.getElementById(`${prefix}manual`)?.value);
    const mri       = n(document.getElementById(`${prefix}mri`)?.value);

    const injDeduct  = Math.max(d.injection, injection * selfRate);
    const manDeduct  = Math.max(d.manual, manual * selfRate);
    const mriDeduct  = Math.max(d.mri, mri * selfRate);
    const injResult  = Math.max(0, injection - injDeduct);
    const manResult  = Math.max(0, manual - manDeduct);
    const mriResult  = Math.max(0, mri - mriDeduct);

    return {
      injDeduct, manDeduct, mriDeduct,
      injResult, manResult, mriResult,
      total: injResult + manResult + mriResult
    };
  }

  // =====================================================
  // 입원 계산 (원본 yt() 함수)
  // =====================================================
  function calcInpatient(g) {
    if (g.is5gen) return { total: 0, gubunPay: 0, nonGubunPay: 0, roomPay: 0, result: 0 };

    const covered    = n(document.getElementById('silson-inp-gubun')?.value);
    const nonCovered = n(document.getElementById('silson-inp-nongubun')?.value);
    const days       = Math.max(1, n(document.getElementById('silson-days')?.value));
    const room       = document.getElementById('silson-room')?.value;
    const roomDiff   = room === 'premium' ? n(document.getElementById('silson-room-diff')?.value) : 0;

    const gubunPay    = covered * (g.coverGubun / 100);
    const nonGubunPay = nonCovered * (g.coverNonGubun / 100);
    const roomPerDay  = roomDiff * 0.5 / days;
    const roomPay     = (g.id === '1gen' ? roomPerDay : Math.min(roomPerDay, 100000)) * days;
    const result      = Math.min(gubunPay + nonGubunPay + roomPay, g.inpatientLimit);

    return { total: covered + nonCovered, gubunPay, nonGubunPay, roomPay, result };
  }

  // =====================================================
  // 결과 렌더링
  // =====================================================
  window.renderSilsonResult = function() {
    const g = GENERATIONS.find(x => x.id === window.silsonState.genId);
    if (!g) return;

    const limitIdx = window.silsonState.limitIdx;
    const grade    = window.silsonState.grade;
    const type     = window.silsonState.type;

    if (type === 'outpatient') {
      // 외래
      const out  = calcOutpatient(g, grade, limitIdx);
      const presc = calcPrescription(g, limitIdx);
      const t3   = calcType3(g, false);

      // 외래 결과 표
      const outEl = document.getElementById('silson-outpatient-result');
      if (outEl) {
        outEl.innerHTML = `<table>
          <tr><td>병원비</td><td>${fmt(out.total)}원</td></tr>
          <tr><td>공제액</td><td>${fmt(out.deduct)}원</td></tr>
          <tr><td>추산보험금</td><td>${fmt(out.result)}원</td></tr>
        </table>`;
      }

      // 약제비 결과 표
      const prescEl = document.getElementById('silson-prescription-result');
      if (prescEl && presc) {
        prescEl.innerHTML = `<table>
          <tr><td>약제비</td><td>${fmt(presc.total)}원</td></tr>
          <tr><td>공제액</td><td>${fmt(presc.deduct)}원</td></tr>
          <tr><td>추산보험금</td><td>${fmt(presc.result)}원</td></tr>
        </table>`;
      }

      // 비급여 3종 공제 표시 + 결과
      if (t3) {
        const setVal = (id, val) => { const el = document.getElementById(id); if(el) el.value = `${fmt(val)}원`; };
        setVal('silson-injection-deduct', t3.injDeduct);
        setVal('silson-manual-deduct',    t3.manDeduct);
        setVal('silson-mri-deduct',       t3.mriDeduct);

        const t3El = document.getElementById('silson-type3-result');
        if (t3El) {
          t3El.innerHTML = `<table>
            <tr><td>주사제</td><td>${fmt(t3.injResult)}원</td></tr>
            <tr><td>도수/체외충격파</td><td>${fmt(t3.manResult)}원</td></tr>
            <tr><td>MRI/MRA</td><td>${fmt(t3.mriResult)}원</td></tr>
            <tr><td>비급여3종 합계</td><td>${fmt(t3.total)}원</td></tr>
          </table>`;
        }
      }

      // 최종 합산
      const total = out.result + (presc?.result || 0) + (t3?.total || 0);
      document.getElementById('silson-total-amount').textContent = `${fmt(total)}원`;

    } else {
      // 입원
      const inp = calcInpatient(g);
      const t3  = calcType3(g, true);

      const inpEl = document.getElementById('silson-inpatient-result');
      if (inpEl) {
        const roomRow = document.getElementById('silson-room')?.value === 'premium'
          ? `<tr><td>상급병실료 지급</td><td>${fmt(inp.roomPay)}원</td></tr>` : '';
        inpEl.innerHTML = `<table>
          <tr><td>급여 지급 (${g.coverGubun||0}%)</td><td>${fmt(inp.gubunPay)}원</td></tr>
          <tr><td>비급여 지급 (${g.coverNonGubun||0}%)</td><td>${fmt(inp.nonGubunPay)}원</td></tr>
          ${roomRow}
          <tr><td>예상보험금</td><td>${fmt(inp.result)}원</td></tr>
        </table>`;
      }

      if (t3) {
        const setVal = (id, val) => { const el = document.getElementById(id); if(el) el.value = `${fmt(val)}원`; };
        setVal('silson-inp-injection-deduct', t3.injDeduct);
        setVal('silson-inp-manual-deduct',    t3.manDeduct);
        setVal('silson-inp-mri-deduct',       t3.mriDeduct);

        const t3El = document.getElementById('silson-inp-type3-result');
        if (t3El) {
          t3El.innerHTML = `<table>
            <tr><td>주사제</td><td>${fmt(t3.injResult)}원</td></tr>
            <tr><td>도수/체외충격파</td><td>${fmt(t3.manResult)}원</td></tr>
            <tr><td>MRI/MRA</td><td>${fmt(t3.mriResult)}원</td></tr>
            <tr><td>비급여3종 합계</td><td>${fmt(t3.total)}원</td></tr>
          </table>`;
        }
      }

      const total = inp.result + (t3?.total || 0);
      document.getElementById('silson-total-amount').textContent = `${fmt(total)}원`;
    }
  };

  // =====================================================
  // 초기 실행
  // =====================================================
  renderGenGrid();
  updateSilsonUI();
  window.renderSilsonResult();

  // 상급병실 change 이벤트
  const roomSel = document.getElementById('silson-room');
  if (roomSel) {
    roomSel.addEventListener('change', function() {
      document.getElementById('silson-room-extra').style.display = this.value === 'premium' ? '' : 'none';
      window.renderSilsonResult();
    });
  }

  // 한도 select change
  const limitSel = document.getElementById('silson-limit-select');
  if (limitSel) {
    limitSel.addEventListener('change', function() {
      window.silsonState.limitIdx = Number(this.value);
      window.renderSilsonResult();
    });
  }

})();
</script>
