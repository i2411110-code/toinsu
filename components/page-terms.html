<style>
.toss-tab-group {
    display:flex; background:#F2F4F6; padding:4px; border-radius:14px;
    margin-bottom:18px; gap:4px;
}
.toss-tab-btn {
    flex:1; padding:13px; border:none; border-radius:11px;
    font-weight:800; font-size:14px; cursor:pointer;
    background:transparent; color:#8B95A1; transition:all 0.15s;
    font-family:'Noto Sans KR', sans-serif;
}
.toss-tab-btn.active { background:white; color:#3182F6; box-shadow:0 1px 4px rgba(0,0,0,0.06); }

.toss-logo-grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap:10px;
}
.toss-logo-card {
    background:white; border-radius:16px; padding:18px 12px;
    display:flex; flex-direction:column; align-items:center; gap:12px;
    border:1px solid #F2F4F6; cursor:pointer; transition:all 0.15s;
}
.toss-logo-card:hover { border-color:#3182F6; transform:translateY(-2px); }
.toss-logo-card img { max-width:80%; max-height:36px; object-fit:contain; }
.toss-logo-card span { font-size:12px; font-weight:700; color:#4E5968; }
</style>

<script>
window.switchTermsTab = function(type) {
    const nonlifeTab = document.getElementById('terms-tab-nonlife');
    const lifeTab    = document.getElementById('terms-tab-life');
    const gridNon    = document.getElementById('terms-grid-nonlife');
    const gridLife   = document.getElementById('terms-grid-life');
    if (type === 'nonlife') {
        nonlifeTab.classList.add('active'); lifeTab.classList.remove('active');
        gridNon.style.display = 'grid'; gridLife.style.display = 'none';
    } else {
        lifeTab.classList.add('active'); nonlifeTab.classList.remove('active');
        gridNon.style.display = 'none'; gridLife.style.display = 'grid';
    }
};
</script>
