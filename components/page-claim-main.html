<div class="sub-page toss" style="display:block; padding: 0; background:transparent; box-shadow:none;">

    <!-- 상단 헤더 -->
    <div class="toss-hero">
        <button class="toss-home-btn" onclick="window.goBack()">
            <i class="bi bi-house-fill"></i> 메인화면
        </button>
        <div class="toss-hero-tag">청구의 모든 것</div>
        <p class="toss-hero-sub">보험금 청구 자동화 시스템</p>
        <p class="toss-hero-date" id="claim-main-date"></p>
        <h1 class="toss-hero-title"><span id="claim-user-name">안녕하세요</span>,<br>오늘도 좋은 하루 보내세요.</h1>
    </div>

    <!-- 4개 메뉴 -->
    <div class="toss-menu-grid">
        <div class="toss-menu-item" onclick="window.navigateTo('page-claim-select.html')">
            <div class="toss-menu-icon" style="background:#EEF2FF; color:#4F46E5;"><i class="bi bi-send-fill"></i></div>
            <span>청구하기</span>
        </div>
        <div class="toss-menu-item" onclick="window.navigateTo('page-terms')">
            <div class="toss-menu-icon" style="background:#EFF6FF; color:#2563EB;"><i class="bi bi-search-heart"></i></div>
            <span>약관조회</span>
        </div>
        <div class="toss-menu-item" onclick="window.navigateTo('page-precedent')">
            <div class="toss-menu-icon" style="background:#F0FDF4; color:#16A34A;"><i class="bi bi-bank2"></i></div>
            <span>보험판례</span>
        </div>
        <div class="toss-menu-item" onclick="window.navigateTo('page-silbi')">
            <div class="toss-menu-icon" style="background:#EFF6FF; color:#2563EB;"><i class="bi bi-calculator-fill"></i></div>
            <span>실비계산기</span>
        </div>
    </div>

    <!-- 공지 슬라이더 바 -->
    <div class="toss-notice-bar" onclick="window.openNoticeListModal()">
        <span class="toss-notice-tag">공지</span>
        <div style="flex:1; overflow:hidden; position:relative; height:20px;">
            <div id="notice-ticker-wrap" style="position:absolute; width:100%; transition:opacity 0.4s ease;">
                <span id="notice-bar-text" style="font-size:14px; font-weight:600; color:#4E5968; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block;">로딩중...</span>
            </div>
        </div>
        <i class="bi bi-chevron-right" style="color:#B0B8C1; flex-shrink:0;"></i>
    </div>

    <!-- 광고 배너 -->
    <div class="banner-wrapper center-banner toss-banner-wrap" style="max-height:300px; overflow:hidden;">
        <div class="banner-box" onclick="window.open('https://naver.me/GiajN4ki')" style="max-height:300px; overflow:hidden;">
            <img src="광고/광고.png" alt="광고배너" class="banner-img" style="max-height:300px; width:100%; object-fit:cover; object-position:center;" onerror="this.parentElement.parentElement.style.display='none'">
        </div>
    </div>

    <!-- ===== 공지 목록 모달 ===== -->
    <div id="notice-list-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9000; align-items:center; justify-content:center;" onclick="document.getElementById('notice-list-modal').style.display='none'">
        <div style="background:white; border-radius:24px; padding:24px; width:92%; max-width:600px; max-height:85vh; overflow-y:auto;" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="font-size:18px; font-weight:800; color:#191F28; margin:0;"><i class="bi bi-megaphone-fill" style="color:#3182F6; margin-right:6px;"></i>공지사항</h3>
                <div style="display:flex; gap:8px; align-items:center;">
                    <div id="notice-admin-write-btn" style="display:none;">
                        <button onclick="window.openNoticeWriter()" style="padding:8px 16px; background:#3182F6; color:white; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer;"><i class="bi bi-pencil-fill"></i> 공지 작성</button>
                    </div>
                    <button onclick="document.getElementById('notice-list-modal').style.display='none'" style="background:#F2F4F6; border:none; width:32px; height:32px; border-radius:50%; font-size:18px; cursor:pointer; color:#8B95A1; display:flex; align-items:center; justify-content:center;">&times;</button>
                </div>
            </div>
            <div id="notice-list-body">
                <div style="text-align:center; padding:40px; color:#B0B8C1; font-size:14px;">불러오는 중...</div>
            </div>
        </div>
    </div>

    <!-- ===== 공지 상세 모달 ===== -->
    <div id="notice-detail-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9500; align-items:center; justify-content:center;" onclick="document.getElementById('notice-detail-modal').style.display='none'">
        <div style="background:white; border-radius:20px; padding:24px; max-width:440px; width:92%; max-height:80vh; overflow-y:auto;" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid #F2F4F6;">
                <span id="notice-detail-tag" style="background:#EFF6FF; color:#3182F6; font-size:11px; font-weight:800; padding:4px 10px; border-radius:8px;">공지</span>
                <div style="display:flex; gap:8px; align-items:center;">
                    <div id="notice-detail-admin-btns" style="display:none; gap:6px; display:none;">
                        <button id="notice-detail-edit-btn" onclick="window.openNoticeEditor()" style="padding:6px 12px; background:#F2F4F6; color:#4E5968; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer;"><i class="bi bi-pencil"></i> 수정</button>
                        <button id="notice-detail-delete-btn" onclick="window.deleteCurrentNotice()" style="padding:6px 12px; background:#FEF2F2; color:#EF4444; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer;"><i class="bi bi-trash"></i> 삭제</button>
                    </div>
                    <button onclick="document.getElementById('notice-detail-modal').style.display='none'" style="background:#F2F4F6; border:none; width:30px; height:30px; border-radius:50%; font-size:16px; cursor:pointer; color:#8B95A1;">&times;</button>
                </div>
            </div>
            <div id="notice-detail-date" style="font-size:12px; color:#B0B8C1; margin-bottom:8px;"></div>
            <h3 id="notice-detail-title" style="font-size:17px; font-weight:800; color:#191F28; margin:0 0 16px;"></h3>
            <div id="notice-detail-content" style="font-size:14px; color:#334155; line-height:1.8; white-space:pre-wrap;"></div>
        </div>
    </div>

    <!-- ===== 관리자 공지 작성/편집 모달 ===== -->
    <div id="notice-editor-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:10000; align-items:center; justify-content:center;" onclick="event.target===this && (this.style.display='none')">
        <div style="background:white; border-radius:20px; padding:24px; max-width:500px; width:92%; max-height:90vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="font-size:17px; font-weight:800; color:#191F28; margin:0;"><i class="bi bi-shield-lock-fill" style="color:#E11D48; margin-right:6px;"></i><span id="editor-modal-title">공지 작성</span></h3>
                <button onclick="document.getElementById('notice-editor-modal').style.display='none'" style="background:#F2F4F6; border:none; width:32px; height:32px; border-radius:50%; font-size:18px; cursor:pointer; color:#8B95A1;">&times;</button>
            </div>

            <input type="hidden" id="notice-edit-id" value="">

            <div style="margin-bottom:14px;">
                <label style="font-size:13px; font-weight:700; color:#64748B; display:block; margin-bottom:6px;">공지 제목</label>
                <input id="notice-edit-title" type="text" style="width:100%; padding:12px 14px; border:1.5px solid #E5E8EB; border-radius:10px; font-size:14px; font-family:inherit; outline:none; box-sizing:border-box;" placeholder="제목을 입력하세요">
            </div>

            <div style="margin-bottom:14px;">
                <label style="font-size:13px; font-weight:700; color:#64748B; display:block; margin-bottom:6px;">내용</label>
                <textarea id="notice-edit-content" style="width:100%; height:180px; padding:12px 14px; border:1.5px solid #E5E8EB; border-radius:10px; font-size:13px; font-family:inherit; outline:none; resize:vertical; line-height:1.7; box-sizing:border-box;" placeholder="공지 내용을 입력하세요."></textarea>
            </div>

            <div style="margin-bottom:20px;">
                <label style="font-size:13px; font-weight:700; color:#64748B; display:block; margin-bottom:8px;">공지 바 슬라이드 게시 여부</label>
                <div style="display:flex; gap:8px;">
                    <button id="publish-btn-yes" onclick="window.setPublish(true)" style="flex:1; padding:11px; border:1.5px solid #3182F6; border-radius:10px; background:#EFF6FF; color:#3182F6; font-weight:700; font-size:13px; cursor:pointer;">
                        <i class="bi bi-megaphone-fill"></i> 슬라이드 게시
                    </button>
                    <button id="publish-btn-no" onclick="window.setPublish(false)" style="flex:1; padding:11px; border:1.5px solid #E5E8EB; border-radius:10px; background:white; color:#8B95A1; font-weight:700; font-size:13px; cursor:pointer;">
                        <i class="bi bi-eye-slash"></i> 목록만 등록
                    </button>
                </div>
            </div>

            <div style="display:flex; gap:8px;">
                <button onclick="document.getElementById('notice-editor-modal').style.display='none'" style="flex:1; padding:13px; background:#F2F4F6; color:#64748B; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer;">취소</button>
                <button onclick="window.saveNotice()" style="flex:2; padding:13px; background:#3182F6; color:white; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer;"><i class="bi bi-cloud-upload-fill"></i> 저장</button>
            </div>
            <p id="notice-save-msg" style="font-size:12px; margin-top:10px; display:none; text-align:center; font-weight:700;"></p>
        </div>
    </div>

    <!-- 청구 현황 -->
    <div class="toss-card">
        <div class="toss-card-head">
            <div class="toss-card-title">청구 현황</div>
            <span class="toss-link" onclick="window.navigateTo('page-docs')">전체보기 <i class="bi bi-chevron-right"></i></span>
        </div>
        <div class="toss-status-grid">
            <div class="toss-status-box">
                <div class="toss-status-num">0<span>건</span></div>
                <div class="toss-status-label">전체 청구</div>
            </div>
            <div class="toss-status-box">
                <div class="toss-status-num">0<span>건</span></div>
                <div class="toss-status-label">임시 저장</div>
            </div>
            <div class="toss-status-box">
                <div class="toss-status-num">0<span>건</span></div>
                <div class="toss-status-label">발송완료</div>
            </div>
        </div>
    </div>

    <!-- 최근 청구 -->
    <div class="toss-card">
        <div class="toss-card-title" style="margin-bottom:16px;">최근 청구</div>
        <div id="claim-recent-list" class="toss-empty">
            <i class="bi bi-inbox"></i>
            최근 청구 내역이 없습니다.
        </div>
    </div>

</div>

<style>
.toss { font-family: 'Noto Sans KR', sans-serif; color:#191F28; padding-bottom: 20px; }
.toss-hero { background: #3182F6; border-radius: 24px; padding: 28px 24px 32px; color: white; position: relative; margin-bottom: 16px; }
.toss-home-btn { position:absolute; top:18px; right:18px; background: rgba(255,255,255,0.18); color:white; border:none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor:pointer; display:flex; align-items:center; gap:6px; transition: background 0.15s; }
.toss-home-btn:hover { background: rgba(255,255,255,0.28); }
.toss-hero-tag { font-size: 14px; font-weight: 700; opacity:0.85; margin-bottom:4px; }
.toss-hero-sub { font-size: 13px; opacity:0.7; margin-bottom: 22px; }
.toss-hero-date { font-size: 13px; opacity:0.75; margin-bottom: 4px; }
.toss-hero-title { font-size: 24px; font-weight: 800; line-height:1.4; letter-spacing:-0.5px; }
.toss-menu-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.toss-menu-item { background: white; border-radius: 18px; padding: 20px 8px; text-align:center; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:10px; border: 1px solid #F2F4F6; transition: all 0.15s; }
.toss-menu-item:hover { background:#F9FAFB; transform: translateY(-2px); }
.toss-menu-icon { width:46px; height:46px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.toss-menu-item span { font-size:13px; font-weight:700; color:#191F28; }
.toss-notice-bar { background:white; border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:10px; border:1px solid #F2F4F6; cursor:pointer; margin-bottom:16px; transition: border-color 0.15s; }
.toss-notice-bar:hover { border-color:#D1D6DB; }
.toss-notice-tag { background:#EFF6FF; color:#3182F6; font-size:11px; font-weight:800; padding:4px 10px; border-radius:8px; flex-shrink:0; }
.toss-banner-wrap { margin-bottom:16px; }
.toss-banner-wrap .banner-box { border-radius:18px; box-shadow:none; border:1px solid #F2F4F6; }
.toss-card { background:white; border-radius:20px; padding:22px 20px; border:1px solid #F2F4F6; margin-bottom:16px; }
.toss-card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.toss-card-title { font-size:17px; font-weight:800; color:#191F28; }
.toss-link { font-size:13px; font-weight:700; color:#3182F6; cursor:pointer; }
.toss-status-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.toss-status-box { background:#F9FAFB; border-radius:14px; padding:18px 8px; text-align:center; }
.toss-status-num { font-size:22px; font-weight:800; color:#191F28; }
.toss-status-num span { font-size:13px; font-weight:700; color:#8B95A1; margin-left:2px; }
.toss-status-label { font-size:12px; color:#8B95A1; font-weight:600; margin-top:6px; }
.toss-empty { text-align:center; color:#B0B8C1; font-size:14px; padding:40px 0; display:flex; flex-direction:column; align-items:center; gap:10px; }
.toss-empty i { font-size:32px; color:#E5E8EB; }
.notice-list-item { padding:16px 0; border-bottom:1px solid #F2F4F6; cursor:pointer; transition:background 0.1s; }
.notice-list-item:last-child { border-bottom:none; }
.notice-list-item:hover { background:#FAFAFA; border-radius:10px; padding-left:8px; }
@media (max-width: 640px) {
    .toss-menu-grid { gap:8px; }
    .toss-menu-item { padding:16px 4px; }
    .toss-menu-item span { font-size:11px; }
    .toss-menu-icon { width:40px; height:40px; font-size:18px; }
    .toss-hero-title { font-size:20px; }
}
</style>
