<div class="sub-page toss" style="display:block; padding: 0; background:transparent; box-shadow:none;">

    <!-- 상단 헤더 -->
    <div class="toss-hero">
        <button class="toss-home-btn" onclick="window.goBack()" style="z-index:10; pointer-events:auto;">
    <i class="bi bi-house-fill"></i> 메인화면
</button>
        </button>
        <div class="toss-hero-tag">청구의 모든 것</div>
        <p class="toss-hero-sub">보험금 청구 자동화 시스템</p>

        <h1 class="toss-hero-title"><span id="claim-user-name">안녕하세요</span>,<br>오늘도 좋은 하루 보내세요.</h1>

        </div>
        <div class="toss-menu-item" onclick="window.navigateTo('page-precedent')">

            <img src="광고/광고.png" alt="광고배너" class="banner-img" style="max-height:120px; width:100%; object-fit:cover; object-position:center;" onerror="this.parentElement.parentElement.style.display='none'">
        </div>
    </div>

    <!-- 공지 상세 모달 -->
    <div id="notice-detail-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;" onclick="document.getElementById('notice-detail-modal').style.display='none'">
        <div style="background:white; border-radius:20px; padding:24px; max-width:420px; width:90%; max-height:80vh; overflow-y:auto;" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; border-bottom:2px solid #3182F6; padding-bottom:12px;">
                <h3 style="font-size:17px; font-weight:800; color:#191F28; margin:0;"><i class="bi bi-megaphone-fill" style="color:#3182F6;"></i> 공지사항</h3>
                <button onclick="document.getElementById('notice-detail-modal').style.display='none'" style="background:none; border:none; font-size:22px; cursor:pointer; color:#8B95A1;">&times;</button>
            </div>
            <div id="notice-detail-content" style="font-size:14px; color:#334155; line-height:1.8; white-space:pre-wrap; margin-bottom:16px;"></div>
            <div id="notice-admin-btn-wrap" style="display:none;">
                <button onclick="window.openNoticeEditor()" style="width:100%; padding:12px; background:#3182F6; color:white; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer;"><i class="bi bi-pencil-square"></i> 공지 수정 (관리자)</button>
            </div>
        </div>
    </div>

    <!-- 관리자 공지 편집 모달 -->
    <div id="notice-editor-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:10000; align-items:center; justify-content:center;" onclick="document.getElementById('notice-editor-modal').style.display='none'">
        <div style="background:white; border-radius:20px; padding:24px; max-width:480px; width:90%;" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h3 style="font-size:17px; font-weight:800; color:#191F28; margin:0;"><i class="bi bi-shield-lock-fill" style="color:#E11D48;"></i> 관리자 공지 편집</h3>
                <button onclick="document.getElementById('notice-editor-modal').style.display='none'" style="background:none; border:none; font-size:22px; cursor:pointer; color:#8B95A1;">&times;</button>
            </div>
            <div style="margin-bottom:12px;">
                <label style="font-size:13px; font-weight:700; color:#64748B; display:block; margin-bottom:6px;">공지 제목 (공지 바에 표시)</label>
                <input id="notice-edit-title" type="text" style="width:100%; padding:11px 14px; border:1.5px solid #E5E8EB; border-radius:10px; font-size:14px; font-family:inherit; outline:none; box-sizing:border-box;" placeholder="예: DB 손해보험 오류 관련 안내">
            </div>
            <div style="margin-bottom:16px;">
                <label style="font-size:13px; font-weight:700; color:#64748B; display:block; margin-bottom:6px;">공지 내용</label>
                <textarea id="notice-edit-content" style="width:100%; height:200px; padding:11px 14px; border:1.5px solid #E5E8EB; border-radius:10px; font-size:13px; font-family:inherit; outline:none; resize:vertical; line-height:1.7; box-sizing:border-box;" placeholder="공지 내용을 입력하세요."></textarea>
            </div>
            <div style="display:flex; gap:8px;">
                <button onclick="document.getElementById('notice-editor-modal').style.display='none'" style="flex:1; padding:12px; background:#F2F4F6; color:#64748B; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer;">취소</button>
                <button onclick="window.saveNotice()" style="flex:2; padding:12px; background:#3182F6; color:white; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer;"><i class="bi bi-cloud-upload-fill"></i> 저장 및 게시</button>
            </div>
            <p id="notice-save-msg" style="font-size:12px; color:#16A34A; margin-top:10px; display:none; text-align:center; font-weight:700;"></p>
        </div>
    </div>

    <!-- 청구 현황 -->
    <div class="toss-card">
        <div class="toss-card-head">
            <div class="toss-card-title">청구 현황</div>
            <span class="toss-link" onclick="window.navigateTo('page-docs')">전체보기 <i class="bi bi-chevron-right"></i></span>
        </div>
        <div class="toss-status-grid">
            <div class="toss-status-box">
                <div class="toss-status-num">0<span>건</span></div>
                <div class="toss-status-label">전체 청구</div>
            </div>
            <div class="toss-status-box">
                <div class="toss-status-num">0<span>건</span></div>
                <div class="toss-status-label">임시 저장</div>
            </div>
            <div class="toss-status-box">
                <div class="toss-status-num">0<span>건</span></div>
                <div class="toss-status-label">발송완료</div>
            </div>
        </div>
    </div>

    <!-- 최근 청구 -->
    <div class="toss-card">
        <div class="toss-card-title" style="margin-bottom:16px;">최근 청구</div>
        <div id="claim-recent-list" class="toss-empty">
            <i class="bi bi-inbox"></i>
            최근 청구 내역이 없습니다.
        </div>
    </div>

</div>

<style>
/* ============ TOSS STYLE ============ */
.toss { font-family: 'Noto Sans KR', sans-serif; color:#191F28; padding-bottom: 20px; }

.toss-hero {
    background: #3182F6;
    border-radius: 24px;
    padding: 28px 24px 32px;
    color: white;
    position: relative;
    margin-bottom: 16px;
}
.toss-home-btn {
    position:absolute; top:18px; right:18px;
    background: rgba(255,255,255,0.18);
    color:white; border:none;
    padding: 8px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 700; cursor:pointer;
    display:flex; align-items:center; gap:6px;
    transition: background 0.15s;
}
.toss-home-btn:hover { background: rgba(255,255,255,0.28); }
.toss-hero-tag { font-size: 14px; font-weight: 700; opacity:0.85; margin-bottom:4px; }
.toss-hero-sub { font-size: 13px; opacity:0.7; margin-bottom: 22px; }
.toss-hero-date { font-size: 13px; opacity:0.75; margin-bottom: 4px; }
.toss-hero-title { font-size: 24px; font-weight: 800; line-height:1.4; letter-spacing:-0.5px; }

.toss-menu-grid {
    display:grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 16px;
}
.toss-menu-item {
    background: white; border-radius: 18px; padding: 20px 8px;
    text-align:center; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    border: 1px solid #F2F4F6;
    transition: all 0.15s;
}
.toss-menu-item:hover { background:#F9FAFB; transform: translateY(-2px); }
.toss-menu-icon {
    width:46px; height:46px; border-radius:14px;
    display:flex; align-items:center; justify-content:center; font-size:20px;
}
.toss-menu-item span { font-size:13px; font-weight:700; color:#191F28; }

.toss-notice-bar {
    background:white; border-radius:14px; padding:14px 16px;
    display:flex; align-items:center; gap:10px;
    border:1px solid #F2F4F6; cursor:pointer; margin-bottom:16px;
    transition: border-color 0.15s;
}
.toss-notice-bar:hover { border-color:#D1D6DB; }
.toss-notice-tag {
    background:#EFF6FF; color:#3182F6; font-size:11px; font-weight:800;
    padding:4px 10px; border-radius:8px; flex-shrink:0;
}
.toss-notice-text { flex:1; font-size:14px; font-weight:600; color:#4E5968; }

.toss-banner-wrap { margin-bottom:16px; }
.toss-banner-wrap .banner-box { border-radius:18px; box-shadow:none; border:1px solid #F2F4F6; }

.toss-card {
    background:white; border-radius:20px; padding:22px 20px;
    border:1px solid #F2F4F6; margin-bottom:16px;
}
.toss-card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.toss-card-title { font-size:17px; font-weight:800; color:#191F28; }
.toss-link { font-size:13px; font-weight:700; color:#3182F6; cursor:pointer; }

.toss-status-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.toss-status-box { background:#F9FAFB; border-radius:14px; padding:18px 8px; text-align:center; }
.toss-status-num { font-size:22px; font-weight:800; color:#191F28; }
.toss-status-num span { font-size:13px; font-weight:700; color:#8B95A1; margin-left:2px; }
.toss-status-label { font-size:12px; color:#8B95A1; font-weight:600; margin-top:6px; }

.toss-empty {
    text-align:center; color:#B0B8C1; font-size:14px; padding:40px 0;
    display:flex; flex-direction:column; align-items:center; gap:10px;
}
.toss-empty i { font-size:32px; color:#E5E8EB; }

@media (max-width: 640px) {
    .toss-menu-grid { gap:8px; }
    .toss-menu-item { padding:16px 4px; }
    .toss-menu-item span { font-size:11px; }
    .toss-menu-icon { width:40px; height:40px; font-size:18px; }
    .toss-hero-title { font-size:20px; }
}
</style>

<script>
(function(){
    const days = ['일','월','화','수','목','금','토'];
    const now = new Date();
    const el = document.getElementById('claim-main-date');
    if(el) el.innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
})();

// ========== 공지 시스템 ==========
const ADMIN_EMAIL = "gaon2026admin@gmail.com"; // 관리자 이메일 (변경 가능)

window.openNoticeModal = async function() {
    const modal = document.getElementById('notice-detail-modal');
    const contentEl = document.getElementById('notice-detail-content');
    const adminBtnWrap = document.getElementById('notice-admin-btn-wrap');
    modal.style.display = 'flex';

    // 관리자 여부 확인
    const isAdmin = window.__currentUserEmail === ADMIN_EMAIL;
    adminBtnWrap.style.display = isAdmin ? 'block' : 'none';

    try {
        const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
        const { getApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
        const db = getFirestore(getApp());
        const snap = await getDoc(doc(db, "site_config", "notice"));
        if (snap.exists()) {
            const d = snap.data();
            contentEl.textContent = d.content || '등록된 공지가 없습니다.';
            const barEl = document.getElementById('notice-bar-text');
            if (barEl) barEl.textContent = d.title || '공지사항';
        } else {
            contentEl.textContent = '등록된 공지가 없습니다.';
        }
    } catch(e) {
        contentEl.textContent = '공지를 불러오지 못했습니다.';
    }
};

window.openNoticeEditor = function() {
    document.getElementById('notice-detail-modal').style.display = 'none';
    const el = document.getElementById('notice-detail-content');
    document.getElementById('notice-edit-content').value = el ? el.textContent : '';
    const barEl = document.getElementById('notice-bar-text');
    document.getElementById('notice-edit-title').value = barEl ? barEl.textContent : '';
    document.getElementById('notice-save-msg').style.display = 'none';
    document.getElementById('notice-editor-modal').style.display = 'flex';
};

window.saveNotice = async function() {
    const title   = document.getElementById('notice-edit-title').value.trim();
    const content = document.getElementById('notice-edit-content').value.trim();
    const msgEl   = document.getElementById('notice-save-msg');
    if (!title || !content) { msgEl.style.color='#EF4444'; msgEl.textContent='제목과 내용을 모두 입력해주세요.'; msgEl.style.display='block'; return; }
    try {
        const { getFirestore, doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
        const { getApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
        const db = getFirestore(getApp());
        await setDoc(doc(db, "site_config", "notice"), { title, content, updatedAt: new Date().toISOString() });
        const barEl = document.getElementById('notice-bar-text');
        if (barEl) barEl.textContent = title;
        msgEl.style.color = '#16A34A';
        msgEl.textContent = '✅ 공지가 성공적으로 게시되었습니다!';
        msgEl.style.display = 'block';
        setTimeout(() => { document.getElementById('notice-editor-modal').style.display = 'none'; }, 1500);
    } catch(e) {
        msgEl.style.color='#EF4444'; msgEl.textContent='저장 실패: ' + e.message; msgEl.style.display='block';
    }
};

// 페이지 로드 시 공지 제목 자동 로드
(async function loadNoticeBar() {
    try {
        const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
        const { getApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
        const db = getFirestore(getApp());
        const snap = await getDoc(doc(db, "site_config", "notice"));
        const barEl = document.getElementById('notice-bar-text');
        if (snap.exists() && barEl) barEl.textContent = snap.data().title || '공지사항';
        else if (barEl) barEl.textContent = 'DB 손해보험 오류 관련 안내';
    } catch(e) {
        const barEl = document.getElementById('notice-bar-text');
        if (barEl) barEl.textContent = 'DB 손해보험 오류 관련 안내';
    }
})();
</script>
