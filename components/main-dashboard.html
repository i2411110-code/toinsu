<style>
/* 메인 대시보드용 toss 스타일 */
.toss-menu-item {
    background: white; border-radius: 18px; padding: 20px 8px;
    text-align:center; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    border: 1px solid #F2F4F6; transition: all 0.15s;
}
.toss-menu-item:hover { background:#F9FAFB; transform: translateY(-2px); }
.toss-menu-icon {
    width:46px; height:46px; border-radius:14px;
    display:flex; align-items:center; justify-content:center; font-size:20px;
}
.toss-menu-item span { font-size:13px; font-weight:700; color:#191F28; }
.toss-hero {
    border-radius: 24px; padding: 28px 24px 32px;
    color: white; position: relative; margin-bottom: 16px;
}
.toss-hero-tag { font-size:14px; font-weight:700; opacity:0.85; margin-bottom:4px; }
.toss-hero-sub { font-size:13px; opacity:0.7; margin-bottom:16px; }
.toss-hero-title { font-size:26px; font-weight:800; line-height:1.4; letter-spacing:-0.5px; }


.hero-banner-btn {
    background: rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 16px 18px;
    cursor: pointer;
    flex: 1;
    min-width: 140px;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
}
.hero-banner-btn:hover { background: rgba(255,255,255,0.25); }
.hero-banner-img {
    width: 48px;
    height: 48px;
    object-fit: contain;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s;
}
.hero-banner-btn:hover .hero-banner-img {
    transform: scale(1.35) translateY(-8px);
    filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.2));
}
</style>
