<div class="sub-page" style="display:block;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <div style="display:flex; gap:6px;">
            <button class="backupBtn" style="padding:6px 12px; border-radius:8px; border:1px solid #CBD5E1; background:white; font-size:12px; cursor:pointer;" onclick="window.exportClientDB()">내보내기</button>
            <button class="backupBtn" style="padding:6px 12px; border-radius:8px; border:1px solid #CBD5E1; background:white; font-size:12px; cursor:pointer;" onclick="document.getElementById('importFile').click()">불러오기</button>
            <input id="importFile" type="file" accept=".json" style="display:none" onchange="window.importClientDB(event)">
        </div>
    </div>

    <div class="section-title" style="display: flex; align-items: center; justify-content: space-between;">
        <div style="display:flex; align-items:center; gap:15px;">
            <div>👤 개인공간 전산실 (<span id="user-private-title">조회중...</span>)</div>
            <button class="inline-home-btn" onclick="window.goBack()"><i class="bi bi-house-door-fill"></i> 메인화면</button>
        </div>
        <button onclick="document.getElementById('help-modal').style.display='flex'" style="background:var(--main-blue); color:white; border:none; padding:8px 16px; border-radius:20px; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px;">
            <i class="bi bi-question-circle-fill"></i> 양식 도움말
        </button>
    </div>
    
    <div class="office-nav">
        <button id="btn-tab-input" class="active" onclick="window.switchOfficeSubTab('input')">고객 정보 입력 및 AI 자동정리</button>
        <button id="btn-tab-list" onclick="window.switchOfficeSubTab('list')">종합 고객 데이터 리스트</button>
    </div>

    <div id="office-sub-input-view">
        <div class="office-box" style="background:#EFF6FF; border:1px dashed #2563EB; margin-bottom:25px; padding:20px;">
            <h4 style="color:#2563EB;"><i class="bi bi-magic"></i> 카톡 원문 통복사 붙여넣기 AI 정렬 장치</h4>
            <p style="font-size:12px; color:var(--text-muted); margin-bottom:10px;">상담이나 카톡방에서 전달받은 고객 원문 스크립트를 그대로 입력하세요.</p>
            <textarea id="ai-raw-textarea" class="form-control" style="height:120px; background:white; margin-bottom:10px; font-size:13px;" placeholder="여기에 양식을 붙여넣으세요. &#10;1. 성명 : 김가온&#10;2. 주민번호 : 960814 - 1XXXXXX..."></textarea>
            <button class="btn-action" style="background:#2563EB;" onclick="window.runAiTextParser()">📋 AI 텍스트 자동 분류 적용</button>
        </div>

        <div class="office-grid">
            <div class="office-box">
                <h4><i class="bi bi-person-fill-check" style="color:#2563EB;"></i> 고객 기본 인적 정보</h4>
                <div class="crm-input-grid">
                    <div class="form-group"><label>성함 (*)</label><input id="c_name" class="form-control"></div>
                    <div class="form-group"><label>관계</label><input id="c_relation" class="form-control"></div>
                    <div class="form-group">
                        <label>계약 여부</label>
                        <select id="c_contract" class="form-control">
                            <option value="완료">완료</option>
                            <option value="진행중">진행중</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>증권 상태</label>
                        <select id="c_document" class="form-control">
                            <option value="출력만">출력만</option>
                            <option value="전달 완료">전달 완료</option>
                            <option value="출력 X">출력 X</option>
                        </select>
                    </div>
                    <div class="form-group"><label>전화번호</label><input id="c_phone" class="form-control"></div>
                    <div class="form-group"><label>주민등록번호</label><input id="c_idnum" class="form-control"></div>
                    <div class="form-group full-row"><label>주소</label><input id="c_address" class="form-control"></div>
                </div>
            </div>

            <div class="office-box">
                <h4><i class="bi bi-file-medical-fill" style="color:#10B981;"></i> 고등 정보</h4>
                <div class="crm-input-grid">
                    <div class="form-group"><label>직업(회사명)</label><input id="c_job" class="form-control"></div>
                    <div class="form-group"><label>운전 여부</label><input id="c_drive" class="form-control"></div>
                    <div class="form-group"><label>키/몸무게</label><input id="c_body" class="form-control"></div>
                    <div class="form-group"><label>실비/계좌지정</label><input id="c_account" class="form-control"></div>
                    <div class="form-group full-row"><label>5년간 병력고지 사항</label><textarea id="c_medical" class="form-control" rows="3"></textarea></div>
                </div>
            </div>
        </div>

        <div class="office-box" style="margin-bottom:20px;">
            <h4><i class="bi bi-journal-text" style="color:#7C3AED;"></i> 진행 상황 및 실시간 메모</h4>
            <textarea id="c_progress" class="form-control" rows="3" placeholder="배정 특약 사항이나 누락된 서류 기록을 기재하세요."></textarea>
            <button class="btn-action" style="background:var(--main-blue); margin-top:15px;" onclick="window.submitCrmData()"> 저장하기</button>
        </div>
    </div>

    <div id="office-sub-list-view" style="display:none;">
        <div class="office-box">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">
                <div style="display:flex; gap:8px;">
                    <select id="f_contract" class="form-control" style="width:110px; padding:8px;" onchange="window.renderCombinedCrmList()">
                        <option value="all">계약 전체</option>
                        <option value="완료">완료</option>
                        <option value="진행중">진행중</option>
                    </select>
                    <select id="f_doc" class="form-control" style="width:110px; padding:8px;" onchange="window.renderCombinedCrmList()">
                        <option value="all">증권 전체</option>
                        <option value="출력만">출력만</option>
                        <option value="전달 완료">전달 완료</option>
                        <option value="출력 X">출력 X</option>
                    </select>
                    <button class="form-control" style="width:80px; padding:8px; cursor:pointer;" onclick="window.sortCombinedCrm('name')">이름순</button>
                    <button class="form-control" style="width:80px; padding:8px; cursor:pointer;" onclick="window.sortCombinedCrm('date')">최신순</button>
                </div>
                <div>
                    <input id="f_search" class="form-control" placeholder="실시간 성함/번호 검색..." style="width:220px; padding:8px;" oninput="window.renderCombinedCrmList()">
                </div>
            </div>
            <table class="portal-table">
                <thead>
                    <tr>
                        <th>성함</th><th>계약여부</th><th>증권구분</th><th>전화번호</th>
                        <th>핵심진행기록</th><th>고등전산</th><th>관리실</th>
                    </tr>
                </thead>
                <tbody id="combined-crm-tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="office-grid" style="margin-top:25px;">
        <div class="office-box">
            <h4><i class="bi bi-calendar-event-fill" style="color:#7C3AED;"></i> 개인 전용 원격 캘린더</h4>
            <div class="form-group"><input type="text" id="todo-input" class="form-control" placeholder="일정을 등록하세요."></div>
            <button class="btn-action" style="background:#7C3AED;" onclick="window.addSchedule()">클라우드 일정 등록</button>
            <ul id="todo-list" style="margin-top:15px; list-style-type: none; padding-left:0; font-size:14px; line-height:2.0;"></ul>
        </div>
        <div class="office-box">
            <h4><i class="bi bi-chat-heart-fill" style="color:#E11D48;"></i> AI 연동 상시 메시지 제안기</h4>
            <div class="form-group">
                <select id="msg-purpose" class="form-control" onchange="window.generateAiMessage()">
                    <option value="none">-- 목적 선택 시 클라우드 규격 가안 자동 포맷팅 --</option>
                    <option value="silbi">5세대 의료 개정 실비 선점 안내 메시지</option>
                    <option value="maternity">태아 및 산모 집중 맞춤형 담보 제안</option>
                    <option value="care">기존 가입 보험 유지율 관리 안부 전송</option>
                </select>
            </div>
            <textarea id="memo-txt" class="form-control" style="height:110px; font-family:monospace; font-size:13px; background:white;"></textarea>
            <button class="btn-action" style="background:#E11D48; margin-top:10px;" onclick="window.saveMemo()">아이디별 고유 가안 원격 보관</button>
        </div>
    </div>
</div>
